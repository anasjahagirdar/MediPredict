name: MediPredict CI Pipeline

# 1. This tells GitHub WHEN to run the action (every push to main)
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # 2. This is the BACKEND testing server
  backend-tests:
    name: Django API Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Backend Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Django Checks & Tests
      env:
        DJANGO_SECRET_KEY: 'ci-dummy-secret-key-for-testing'
        DJANGO_DEBUG: 'True'
        DB_MODE: 'local'
      run: |
        python manage.py check
        # If you haven't written tests yet, it will just say "Ran 0 tests" and pass!
        python manage.py test 

  # 3. This is the FRONTEND build server
  frontend-build:
    name: React UI Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Frontend Dependencies
      run: npm install

    - name: Verify Production Build
      run: npm run build